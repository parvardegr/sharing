<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>upload</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>

    <style type="text/css">
        body {
            background-color: #005bff47;
            margin: 0;
        }

        #uploadForm {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 24px 0;
            box-sizing: border-box;
        }

        #share-container {
            padding: 16px;
            background-color: blueviolet;
            border: 5px solid #181818;
            font-size: 32px;
            font-size: 5vw;
            font-family: monospace;
            box-sizing: content-box;
            font-weight: bolder;
            text-align: center;
            color: #181818;
            cursor: pointer;
        }

        #share-container.dragover {
            background-color: #b388ff;
            outline: 4px dashed #181818;
            outline-offset: 6px;
        }

        a {
            font-size: 32px;
            font-size: 5vw;
            font-family: monospace;
            font-weight: bolder;
        }

        #share-container {
            margin-bottom: 20px;
        }

        #hint {
            font-family: monospace;
            font-weight: bold;
            color: #181818;
            margin-bottom: 16px;
            text-align: center;
        }

        #progress-container {
            display: none;
            width: 80%;
            max-width: 500px;
            margin-top: 20px;
        }

        #progress-bar-bg {
            width: 100%;
            background-color: #ddd;
            border: 3px solid #181818;
            box-sizing: border-box;
        }

        #progress-bar {
            width: 0%;
            height: 30px;
            background-color: blueviolet;
            transition: width 0.2s;
        }

        #progress-text {
            font-family: monospace;
            font-weight: bolder;
            font-size: 18px;
            text-align: center;
            margin-top: 8px;
            color: #181818;
        }
    </style>

    <body>
        <form ref='uploadForm'
          id='uploadForm'
          action='/upload'
          method='post'
          encType="multipart/form-data">
            <div id="share-container">
                <label id="share" for="file-input" class="btn">Share files🚀</label>
            </div>
            <div id="hint">Tap to choose, or drag &amp; drop files here</div>
            <a href="{shareAddress}" target="_blank">View directory📁</a>
            <input id="file-input" type="file" name="selected" multiple style="visibility:hidden; display:none;"/>
        </form>
        <div id="progress-container">
            <div id="progress-bar-bg">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-text">0%</div>
        </div>
    </body>

    <script>
        var fileInput = document.getElementById("file-input");
        var dropZone = document.getElementById("share-container");
        var progressContainer = document.getElementById("progress-container");
        var progressBar = document.getElementById("progress-bar");
        var progressText = document.getElementById("progress-text");
        var shareLabel = document.getElementById("share");

        function uploadFiles(files) {
            if (!files || files.length === 0) return;

            var formData = new FormData();
            for (var i = 0; i < files.length; i++) {
                formData.append("selected", files[i]);
            }

            var xhr = new XMLHttpRequest();
            progressContainer.style.display = "block";
            shareLabel.innerText = files.length > 1 ? ("Sending " + files.length + " files…") : "Sending…";

            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + "%";
                    progressText.innerText = percent + "%";
                }
            };

            xhr.onload = function () {
                if (xhr.status === 200) {
                    progressBar.style.width = "100%";
                    progressText.innerText = "100%";
                    shareLabel.innerText = "Done! ✅";
                    setTimeout(function () {
                        window.location.href = "{postUploadRedirectUrl}";
                    }, 1000);
                } else {
                    shareLabel.innerText = "Error ❌";
                    progressText.innerText = "Upload failed";
                }
            };

            xhr.onerror = function () {
                shareLabel.innerText = "Error ❌";
                progressText.innerText = "Upload failed";
            };

            xhr.open("POST", "/upload", true);
            xhr.send(formData);
        }

        fileInput.onchange = function () {
            uploadFiles(this.files);
        };

        // Drag-and-drop support.
        ["dragenter", "dragover"].forEach(function (evt) {
            dropZone.addEventListener(evt, function (e) {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add("dragover");
            });
        });
        ["dragleave", "drop"].forEach(function (evt) {
            dropZone.addEventListener(evt, function (e) {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove("dragover");
            });
        });
        dropZone.addEventListener("drop", function (e) {
            if (e.dataTransfer && e.dataTransfer.files) {
                uploadFiles(e.dataTransfer.files);
            }
        });
    </script>

</html>
