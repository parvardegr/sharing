<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>upload</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>

    <style type="text/css">
        body {
            background-color: #005bff47;
            margin: 0;
        }

        #uploadForm {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }

        #share-container {
            padding: 16px;
            background-color: blueviolet;
            border: 5px solid #181818;
            font-size: 32px;
            font-size: 5vw;
            font-family: monospace;
            box-sizing: content-box;
            font-weight: bolder;
            text-align: center;
            color: #181818;
        }
        
        a {
            font-size: 32px;
            font-size: 5vw;
            font-family: monospace;
            font-weight: bolder;
        }

        #share-container {
            margin-bottom: 20px;
        }

        #progress-container {
            display: none;
            width: 80%;
            max-width: 500px;
            margin-top: 20px;
        }

        #progress-bar-bg {
            width: 100%;
            background-color: #ddd;
            border: 3px solid #181818;
            box-sizing: border-box;
        }

        #progress-bar {
            width: 0%;
            height: 30px;
            background-color: blueviolet;
            transition: width 0.2s;
        }

        #progress-text {
            font-family: monospace;
            font-weight: bolder;
            font-size: 18px;
            text-align: center;
            margin-top: 8px;
            color: #181818;
        }
    </style>

    <body>
        <form ref='uploadForm' 
          id='uploadForm' 
          action='/upload' 
          method='post' 
          encType="multipart/form-data">
            <div id="share-container">
                <label id="share" for="file-input" class="btn">Share file🚀</label>
            </div>
            <a href="{shareAddress}" target="_blank">View directory📁</a>
            <input id="file-input" type="file" name="selected" style="visibility:hidden; display:none;"/>
        </form>
        <div id="progress-container">
            <div id="progress-bar-bg">
                <div id="progress-bar"></div>
            </div>
            <div id="progress-text">0%</div>
        </div>
    </body>

    <script>
        document.getElementById("file-input").onchange = function() {
            var file = this.files[0];
            if (!file) return;

            var formData = new FormData();
            formData.append("selected", file);

            var xhr = new XMLHttpRequest();

            var progressContainer = document.getElementById("progress-container");
            var progressBar = document.getElementById("progress-bar");
            var progressText = document.getElementById("progress-text");
            var shareLabel = document.getElementById("share");

            progressContainer.style.display = "block";
            shareLabel.innerText = "Sending...";

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + "%";
                    progressText.innerText = percent + "%";
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    progressBar.style.width = "100%";
                    progressText.innerText = "100%";
                    shareLabel.innerText = "Done! ✅";
                    setTimeout(function() {
                        window.location.href = "{postUploadRedirectUrl}";
                    }, 1000);
                } else {
                    shareLabel.innerText = "Error ❌";
                    progressText.innerText = "Upload failed";
                }
            };

            xhr.onerror = function() {
                shareLabel.innerText = "Error ❌";
                progressText.innerText = "Upload failed";
            };

            xhr.open("POST", "/upload", true);
            xhr.send(formData);
        };
    </script>

</html>
